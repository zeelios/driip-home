services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: driip
      POSTGRES_PASSWORD: driip_dev
      POSTGRES_DB: driip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driip"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (local Upstash substitute) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API (full Docker build — use `make dev` for faster native workflow) ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    environment:
      DATABASE_URL: postgres://driip:driip_dev@db:5432/driip
      PORT: "3000"
    profiles:
      - full # only start with: docker compose --profile full up

volumes:
  postgres_data:
  cargo_cache:
  target_cache:
