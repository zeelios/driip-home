version: '3.8'

services:
  # Laravel Application (PHP-FPM)
  app:
    container_name: driip-app
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - APP_NAME=Driip
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - LOG_CHANNEL=single

      # Database
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=driip_dev
      - DB_USERNAME=driip
      - DB_PASSWORD=${DB_PASSWORD:-driip_password}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis

      # Meilisearch
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-dev_key}
      - SCOUT_DRIVER=meilisearch

      # Mail (MailHog for testing)
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_FROM_ADDRESS=no-reply@driip.local
      - MAIL_FROM_NAME=Driip

      # Minio (S3-compatible local storage)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=driip-dev
      - AWS_ENDPOINT=http://minio:9000
      - AWS_USE_PATH_STYLE_ENDPOINT=true

    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/storage
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio
    networks:
      - driip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    container_name: driip-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=driip_dev
      - POSTGRES_USER=driip
      - POSTGRES_PASSWORD=${DB_PASSWORD:-driip_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - driip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driip"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    container_name: driip-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - driip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (Full-text Search)
  meilisearch:
    container_name: driip-meilisearch
    image: getmeili/meilisearch:v1.9-alpine
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-dev_key}
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - driip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Web Server
  nginx:
    container_name: driip-nginx
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/app:ro
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - driip-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MailHog (Email Testing)
  mailhog:
    container_name: driip-mailhog
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - driip-network

  # Minio (Local S3-compatible for B2 testing)
  minio:
    container_name: driip-minio
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    networks:
      - driip-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Laravel Queue Worker (Background Jobs)
  queue-worker:
    container_name: driip-queue-worker
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - APP_NAME=Driip
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=driip_dev
      - DB_USERNAME=driip
      - DB_PASSWORD=${DB_PASSWORD:-driip_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/storage
    depends_on:
      - postgres
      - redis
      - app
    networks:
      - driip-network
    command: php artisan queue:work redis --sleep=3 --tries=3
    restart: unless-stopped

  # Laravel Scheduler (Cron Jobs)
  scheduler:
    container_name: driip-scheduler
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - APP_NAME=Driip
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=driip_dev
      - DB_USERNAME=driip
      - DB_PASSWORD=${DB_PASSWORD:-driip_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
      - /app/vendor
      - /app/storage
    depends_on:
      - postgres
      - redis
      - app
    networks:
      - driip-network
    command: php artisan schedule:work
    restart: unless-stopped

  # Adminer (Database GUI - Optional but helpful)
  adminer:
    container_name: driip-adminer
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - driip-network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  driip-network:
    driver: bridge
